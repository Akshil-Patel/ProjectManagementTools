<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <style>
        .main{
            background-color: #888;
            height: 300px;
            width: 300px;
            border-radius: 10px;
            margin: auto;
            margin-top: 50px;
            display: flex;
            flex-direction: column;
        }

        body{
            background-color: #9999;
        }

        #text{
            /* justify-content: center; */
            /* align-items: center; */
            background-color: white;
            height: 50px;
            width: 180px;
            margin: auto;
            margin-top: 50px;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
        }

        #buttons{
            justify-content: center;
            align-items: center;
            margin-bottom: 100px;
        }

        .button{
            width: 100px;
            height: 30px;
            border-radius: 10px;
        }

    </style>
</head>
<body>
    <div class="main">
        <div id="text">
        </div>
        <div id="buttons">
            <center>
                <button class="button" onclick="start()">START</button>
                <button class="button" onclick="stop()">STOP</button>
            </center>
        </div>
    </div>

</body>
<script>
var counter=0;
var myInterval;
 function start(){
    myInterval = setInterval(count,1000);
}

function stop(){
    clearInterval(myInterval);
}

function count(){
    document.getElementById('text').innerText = counter;
    counter++;
}

</script>
</html>
